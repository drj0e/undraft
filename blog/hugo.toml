baseURL = "https://josephcapozzoli.com/"
languageCode = "en-us"
title = "Joe Capozzoli"
theme = "PaperMod"

[params]
  author = "Joe Capozzoli"
  description = "Architecture, AI, and the things that actually happen when you build enterprise software."
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  defaultTheme = "light"
  disableSpecial1stPost = true
  hideFooter = false

  [[params.footerLinks]]
    name = "GitHub"
    url = "https://github.com/drj0e"
    external = true
  [[params.footerLinks]]
    name = "LinkedIn"
    url = "https://www.linkedin.com/in/josephcapozzoli/"
    external = true

# homeInfoParams removed — homepage goes straight to post list
# Bio lives on the About page

[params.assets]
  disableFingerprinting = false

[params.footer]
  hideCopyright = false

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 2
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 3
